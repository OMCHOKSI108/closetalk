version: "3.9"

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
        PORT: 8081
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: "postgres://closetalk:closetalk@neon:5432/closetalk?sslmode=disable"
      VALKEY_ADDR: "valkey:6379"
      VALKEY_PASSWORD: ""
      JWT_SECRET: "closetalk-dev-secret-change-in-production"
    depends_on:
      neon:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  neon:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: closetalk
      POSTGRES_PASSWORD: closetalk
      POSTGRES_DB: closetalk
    volumes:
      - neon_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U closetalk -d closetalk"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  message-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: message-service
        PORT: 8082
    ports:
      - "8082:8082"
    environment:
      MESSAGE_SERVICE_PORT: "8082"
      VALKEY_ADDR: "valkey:6379"
      JWT_SECRET: "closetalk-dev-secret-change-in-production"
      AWS_REGION: "us-east-1"
      DYNAMODB_ENDPOINT: "http://dynamodb-local:8000"
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
    depends_on:
      valkey:
        condition: service_healthy
      dynamodb-local:
        condition: service_started
    restart: unless-stopped

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8.1-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  neon_data:
  valkey_data:
